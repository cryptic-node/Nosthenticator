openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Nosthenticator — secure cross-platform authenticator for OTP and Nostr identities
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: credentials
    description: Credential vault management
  - name: codes
    description: Live TOTP/HOTP code generation
  - name: nostr
    description: Nostr identity and auth request management
  - name: activity
    description: Activity log
  - name: vault
    description: Backup, export, and import
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /credentials:
    get:
      operationId: listCredentials
      tags: [credentials]
      summary: List all credentials
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [totp, hotp, nostr]
        - name: favorites
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of credentials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credential"
    post:
      operationId: createCredential
      tags: [credentials]
      summary: Add a new credential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCredentialBody"
      responses:
        "201":
          description: Credential created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"

  /credentials/{id}:
    get:
      operationId: getCredential
      tags: [credentials]
      summary: Get a credential
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        "404":
          description: Not found
    put:
      operationId: updateCredential
      tags: [credentials]
      summary: Update a credential label or settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCredentialBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
    delete:
      operationId: deleteCredential
      tags: [credentials]
      summary: Delete a credential
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /credentials/{id}/favorite:
    post:
      operationId: toggleFavorite
      tags: [credentials]
      summary: Toggle favorite status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"

  /codes:
    get:
      operationId: getAllCodes
      tags: [codes]
      summary: Get current TOTP/HOTP codes for all eligible credentials
      responses:
        "200":
          description: All live codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LiveCode"

  /codes/{id}:
    get:
      operationId: getCode
      tags: [codes]
      summary: Get the current code for a single credential
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveCode"
        "404":
          description: Not found

  /nostr/requests:
    get:
      operationId: listNostrRequests
      tags: [nostr]
      summary: List pending Nostr auth requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, expired]
      responses:
        "200":
          description: Nostr auth requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NostrRequest"
    post:
      operationId: createNostrRequest
      tags: [nostr]
      summary: Submit a new Nostr auth request (for simulation/testing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNostrRequestBody"
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NostrRequest"

  /nostr/requests/{id}/approve:
    post:
      operationId: approveNostrRequest
      tags: [nostr]
      summary: Approve a Nostr auth request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NostrRequest"

  /nostr/requests/{id}/reject:
    post:
      operationId: rejectNostrRequest
      tags: [nostr]
      summary: Reject a Nostr auth request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NostrRequest"

  /activity:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get activity log
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: credentialId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityEntry"
                  total:
                    type: integer
                required:
                  - entries
                  - total

  /vault/stats:
    get:
      operationId: getVaultStats
      tags: [vault]
      summary: Vault summary statistics
      responses:
        "200":
          description: Vault stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultStats"

  /vault/export:
    post:
      operationId: exportVault
      tags: [vault]
      summary: Export all credentials as an encrypted bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportVaultBody"
      responses:
        "200":
          description: Export bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportBundle"

  /vault/import:
    post:
      operationId: importVault
      tags: [vault]
      summary: Import credentials from an export bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportVaultBody"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Credential:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [totp, hotp, nostr]
        label:
          type: string
        issuer:
          type: string
        accountName:
          type: string
        algorithm:
          type: string
          enum: [SHA1, SHA256, SHA512]
          nullable: true
        digits:
          type: integer
          nullable: true
        period:
          type: integer
          nullable: true
        counter:
          type: integer
          nullable: true
        npub:
          type: string
          nullable: true
        secretMode:
          type: string
          enum: [none, auth-only, full-signer]
          nullable: true
        favorite:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - type
        - label
        - issuer
        - accountName
        - favorite
        - createdAt

    CreateCredentialBody:
      type: object
      properties:
        type:
          type: string
          enum: [totp, hotp, nostr]
        label:
          type: string
        issuer:
          type: string
        accountName:
          type: string
        secret:
          type: string
          description: Base32-encoded TOTP/HOTP secret, or nsec for Nostr
          nullable: true
        algorithm:
          type: string
          enum: [SHA1, SHA256, SHA512]
          nullable: true
        digits:
          type: integer
          nullable: true
        period:
          type: integer
          nullable: true
        npub:
          type: string
          nullable: true
        secretMode:
          type: string
          enum: [none, auth-only, full-signer]
          nullable: true
      required:
        - type
        - label
        - issuer
        - accountName

    UpdateCredentialBody:
      type: object
      properties:
        label:
          type: string
        issuer:
          type: string
        accountName:
          type: string
        favorite:
          type: boolean
        secretMode:
          type: string
          enum: [none, auth-only, full-signer]
          nullable: true

    LiveCode:
      type: object
      properties:
        credentialId:
          type: string
        label:
          type: string
        issuer:
          type: string
        code:
          type: string
        timeRemaining:
          type: integer
          description: Seconds until code refreshes
        period:
          type: integer
        digits:
          type: integer
        favorite:
          type: boolean
      required:
        - credentialId
        - label
        - issuer
        - code
        - timeRemaining
        - period
        - digits
        - favorite

    NostrRequest:
      type: object
      properties:
        id:
          type: string
        credentialId:
          type: string
          nullable: true
        npub:
          type: string
          nullable: true
        requesterName:
          type: string
        requesterOrigin:
          type: string
        actionType:
          type: string
          enum: [sign_in, authorize_action, link_device, recovery, key_rotation]
        actionSummary:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high]
        status:
          type: string
          enum: [pending, approved, rejected, expired]
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
      required:
        - id
        - requesterName
        - requesterOrigin
        - actionType
        - actionSummary
        - riskLevel
        - status
        - createdAt
        - expiresAt

    CreateNostrRequestBody:
      type: object
      properties:
        credentialId:
          type: string
          nullable: true
        requesterName:
          type: string
        requesterOrigin:
          type: string
        actionType:
          type: string
          enum: [sign_in, authorize_action, link_device, recovery, key_rotation]
        actionSummary:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high]
      required:
        - requesterName
        - requesterOrigin
        - actionType
        - actionSummary
        - riskLevel

    ActivityEntry:
      type: object
      properties:
        id:
          type: string
        credentialId:
          type: string
          nullable: true
        credentialLabel:
          type: string
          nullable: true
        eventType:
          type: string
          enum: [auth_approved, auth_rejected, code_viewed, export, import, credential_added, credential_deleted, nostr_approved, nostr_rejected]
        description:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - eventType
        - description
        - timestamp

    VaultStats:
      type: object
      properties:
        totalCredentials:
          type: integer
        totpCount:
          type: integer
        nostrCount:
          type: integer
        pendingRequests:
          type: integer
        todayApprovals:
          type: integer
        lastActivity:
          type: string
          format: date-time
          nullable: true
      required:
        - totalCredentials
        - totpCount
        - nostrCount
        - pendingRequests
        - todayApprovals

    ExportVaultBody:
      type: object
      properties:
        includeSecrets:
          type: boolean
          default: false
        password:
          type: string
          nullable: true
      required:
        - includeSecrets

    ExportBundle:
      type: object
      properties:
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        itemCount:
          type: integer
        includesSecrets:
          type: boolean
        data:
          type: string
          description: Base64-encoded encrypted JSON payload
        checksum:
          type: string
      required:
        - version
        - createdAt
        - itemCount
        - includesSecrets
        - data
        - checksum

    ImportVaultBody:
      type: object
      properties:
        data:
          type: string
          description: Base64-encoded bundle data
        password:
          type: string
          nullable: true
      required:
        - data

    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
        - imported
        - skipped
        - errors
